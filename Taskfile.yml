version: "3"

# Schema governance gates. buf is required (https://buf.build); these run in
# pre-commit / CI, not from the daemon.
tasks:
  lint:
    desc: Lint the protobuf contracts.
    cmds:
      - buf lint

  breaking:
    desc: Reject schema changes that break FULL_TRANSITIVE compatibility against main.
    cmds:
      - buf breaking --against ".git#branch=main"

  generate:
    desc: Generate language bindings into gen/ (never committed; see .gitignore).
    cmds:
      - buf generate

  e2e:
    desc: >-
      End-to-end test of the kafka-tier kube manifests against a reachable
      cluster (needs a default storageclass). Hermetic: a throwaway kafka-e2e
      namespace with dynamic storage; never touches ~/var or the fleet ns.
      Pass flags through, e.g. `task e2e -- --human --keep`.
    cmds:
      - ./tests/e2e/kafka-tier-e2e.sh {{.CLI_ARGS}}

  ci:
    desc: Full pre-commit / CI gate.
    cmds:
      - task: lint
      - task: breaking

syntax = "proto3";

package observability.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/janearc/kafka-svc/gen/go/observability/v1;observabilityv1";

// HealthState is the fleet-wide health classification shared by service
// heartbeats, fleet rollups, and quota runway.
enum HealthState {
  HEALTH_STATE_UNSPECIFIED = 0;
  HEALTH_STATE_GREEN = 1;
  HEALTH_STATE_YELLOW = 2;
  HEALTH_STATE_RED = 3;
  HEALTH_STATE_EXHAUSTED = 4; // terminal: quota fully consumed
}

// ServiceHealthHeartbeat is emitted by every fleet service on its heartbeat
// tick. Subject (RecordNameStrategy): observability.v1.ServiceHealthHeartbeat.
message ServiceHealthHeartbeat {
  string service_name = 1;
  HealthState current_state = 2;
  uint32 uptime_seconds = 3;
  uint32 internal_load_metric = 4;
  google.protobuf.Timestamp timestamp = 5;

  // idempotency_key makes duplicate delivery safe (UUID or service+timestamp).
  string idempotency_key = 6;
}

// TokenBurnEvent records LLM token consumption for cost and activity tracking.
message TokenBurnEvent {
  string agent_id = 1;
  string action_context = 2;
  uint32 tokens_consumed = 3;
  optional uint32 cost_estimated_micro_usd = 4;
  google.protobuf.Timestamp timestamp = 5;
  string idempotency_key = 6;
}

// WidgetStatePayload is the aggregated snapshot pushed to the observability
// widget by obs-svc-agg.
message WidgetStatePayload {
  google.protobuf.Timestamp calculated_at = 1;
  FleetMetrics fleet = 2;
  QuotaMetrics quota = 3;
}

// FleetMetrics is the rolled-up health of the node fleet at a point in time,
// computed by obs-svc-agg from the per-service heartbeats it consumes.
message FleetMetrics {
  HealthState overall_health = 1;
  uint32 active_nodes = 2;
  uint32 degraded_nodes = 3;
  string active_discovery_endpoint = 4;
}

// QuotaMetrics is the LLM token runway: how much budget remains and how fast it
// is burning. It drives the widget's quota state, including the terminal
// HEALTH_STATE_EXHAUSTED when the runway hits zero.
message QuotaMetrics {
  HealthState runway_state = 1;
  uint32 runway_minutes_remaining = 2;
  uint32 burn_rate_tokens_per_minute = 3;
  uint32 absolute_quota_remaining_cents = 4;
}

// TransferEvent is emitted by taco after each transfer completes (success or
// failure). It carries taco's passive instrumentation of one real transfer over a
// possibly-bad link -- so link quality becomes first-class data to aggregate and
// reason about, instead of being thrown away the way a plain downloader does. The
// fields mirror taco's internal per-transfer record. Measurement is passive: these
// numbers come from the real bytes moved, never a synthetic probe.
// Subject (RecordNameStrategy): observability.v1.TransferEvent.
message TransferEvent {
  // idempotency_key is taco's stable per-transfer id, so duplicate delivery (e.g.
  // a store-and-forward replay after the link returns) is safe to dedupe.
  string idempotency_key = 1;
  string host = 2; // the machine that ran the transfer

  string url = 3;
  string dest = 4;

  uint64 bytes_transferred = 5;  // payload bytes this run moved
  uint64 resumed_from_bytes = 6; // bytes already on disk when this run started
  uint64 content_bytes = 7;      // total size if the server reported one, else 0

  double avg_throughput_bps = 8;
  double min_throughput_bps = 9; // slowest one-second window (the per-transfer nadir)

  uint32 num_retries = 10;
  uint32 num_connects = 11; // HTTP requests issued (initial + retries/resumes)
  uint32 http_code = 12;

  int32 exit_code = 13; // 0 = success, non-zero = the transfer ultimately failed
  string error = 14;

  // sleep_overlap is true when host sleep/wake fell inside the transfer window,
  // so a stall can be attributed to the host sleeping rather than to the link.
  bool sleep_overlap = 15;

  // active_probe distinguishes a deliberate speedtest sample (taco#11) from a real
  // user transfer. False for ordinary transfers.
  bool active_probe = 16;

  google.protobuf.Timestamp started_at = 17;
  google.protobuf.Timestamp ended_at = 18;
}

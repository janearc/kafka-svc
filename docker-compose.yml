services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_NUM_NETWORK_THREADS=4
      - KAFKA_NUM_IO_THREADS=4
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_LOG_DIRS=/kafka/logs
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      # advertise the in-network docker name so every service on dev-fleet (and
      # schema-registry, whose bootstrap is kafka:9092) can actually reconnect.
      # the prior kafka.localhost:9092 only resolved from the host and silently
      # broke in-cluster clients.
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_HEAP_OPTS=-Xms512m -Xmx1024m
    ports:
      - "9092"
    volumes:
      - /Users/jane/var/kafka:/kafka/logs
    depends_on:
      - zookeeper
    networks:
      - dev-fleet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kafka.rule=Host(`kafka.localhost`)"
      - "traefik.http.services.kafka.loadbalancer.server.port=9092"
      - "fleet.essential=true"
      # self-declare the lifecycle tier. fleet's start/stop ordering reads this
      # label to discover the message backbone instead of matching repo name; the
      # bus comes up after the network owner and before the control plane.
      - "fleet.tier=backbone"
    deploy:
      resources:
        limits:
          cpus: "4"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2181"
    networks:
      - dev-fleet
    labels:
      - "fleet.essential=true"
      # zookeeper is part of the message backbone tier (kafka depends on it);
      # declare the same lifecycle tier so it starts/stops with the bus.
      - "fleet.tier=backbone"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - kafka
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      # fleet-wide default: never break forward or backward across schema history
      - SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL=full_transitive
    ports:
      - "8081"
    networks:
      - dev-fleet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.schema-registry.rule=Host(`schema-registry.localhost`)"
      - "traefik.http.services.schema-registry.loadbalancer.server.port=8081"
      - "fleet.essential=true"
      # schema-registry rides with the bus it fronts; same backbone tier.
      - "fleet.tier=backbone"

# dev-fleet is the single shared "dev" network (defined/owned by traefik).
# Everything lives here so services reach each other by docker DNS name; traefik
# coordinates HTTP on top. No segmentation -- that's a kube concern for later.
networks:
  dev-fleet:
    external: true
